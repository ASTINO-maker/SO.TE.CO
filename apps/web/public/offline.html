<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne — SO.TE.CO</title>
    <link rel="icon" href="/brand/sotec-mark.jpg" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #f7f2e8;
        color: #1f2937;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .card {
        max-width: 460px;
        background: #ffffff;
        border: 1px solid #e7decb;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(35, 28, 16, 0.08);
        text-align: center;
      }
      .logo { width: 56px; height: 56px; border-radius: 16px; object-fit: cover; margin: 0 auto 16px; display: block; }
      h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.02em; color: #0f172a; }
      p { margin: 0 0 12px; line-height: 1.5; color: #475569; font-size: 14px; }
      .badge { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: #b45309; background: #fef3c7; padding: 6px 12px; border-radius: 999px; margin-bottom: 16px; }
      .badge::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: #f59e0b; }
      button {
        margin-top: 16px;
        padding: 10px 18px;
        border-radius: 14px;
        border: 0;
        background: #2f4156;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { background: #253548; }
      .hint { margin-top: 14px; font-size: 12px; color: #94a3b8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <img class="logo" src="/brand/sotec-mark.jpg" alt="SO.TE.CO" />
        <div class="badge">Connexion hors ligne</div>
        <h1>SO.TE.CO est temporairement injoignable</h1>
        <p>Vérifiez votre connexion internet, puis réessayez. Vos données enregistrées en ligne resteront intactes.</p>
        <button onclick="location.reload()">Réessayer</button>
        <div class="hint">Vous pouvez aussi attendre quelques secondes — la page se rechargera automatiquement à la reconnexion.</div>
      </div>
    </div>
    <script>
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
